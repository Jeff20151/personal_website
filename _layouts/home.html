---
layout: default
---
<section class="hero">
  <div class="hero-inner">
    <img class="hero-avatar" src="{{ site.author.avatar | relative_url }}" alt="{{ site.author.name }}">
    <h1 class="hero-name">{{ page.hero_name }}</h1>
    <p class="hero-title">{{ page.hero_title }}</p>
    <p class="hero-bio">{{ page.hero_bio }}</p>
    <div class="hero-links">
      {{ content }}
    </div>
  </div>
</section>
